<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title> 추억 사진 짝맞추기</title>
<style>
body { text-align: center; background: #fdf2f8; font-family: sans-serif; }
.grid { display: grid; grid-template-columns: repeat(4, 150px); gap: 10px; justify-content:
center; margin-top: 20px; }

.card { width: 150px; height: 150px; background: #f43f5e; color: white; display: flex; align-items: center;

justify-content: center; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 8px; }

.card.flipped { background: #fff; border: 2px solid #f43f5e; }
.card img { width: 100%; height: 100%; border-radius: 6px; object-fit: cover; }
</style>
</head>
<body>
<h2> 카드 짝을 맞춰서 우리의 추억을 확인해봐!</h2>
<div class="grid" id="grid"></div>
<script>
// 카드 이미지 파일 경로 세팅 (사진을 준비해서 img/ 폴더에 넣으세요)
const images = ['img/멀쩡1.jpg', 'img/이상1(언니).jpg', 'img/이상2(오빠).jpg', 'img/멀쩡2.jpg'];

let cardsData = [...images, ...images].sort(() => 0.5 - Math.random());
let selected = [];
let matchedCount = 0;
const grid = document.getElementById('grid');
cardsData.forEach((imgSrc, idx) => {
const card = document.createElement('div');
card.className = 'card';
card.dataset.img = imgSrc;
card.innerText = ' ';
card.onclick = () => flipCard(card);
grid.appendChild(card);
});
function flipCard(card) {
if (selected.length < 2 && !card.classList.contains('flipped')) {
card.classList.add('flipped');
card.innerHTML = `<img src="${card.dataset.img}" alt="pic">`;
selected.push(card);
if (selected.length === 2) {
if (selected[0].dataset.img === selected[1].dataset.img) {
matchedCount += 2;
selected = [];
if (matchedCount === cardsData.length) {
setTimeout(() => alert("앞으로 우리가 쌓아갈 추억이 더 많을것이야! 우하하"), 500);
}
} else {
setTimeout(() => {
selected.forEach(c => { c.classList.remove('flipped'); c.innerText = ' '; });
selected = [];
}, 1000);
}
}
}

}
</script>
</body>
</html>
